spring.application.name=vacaciones-sin-stress
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_CONTEXT_PATH:}

# -----------------------------
# DataSource (PostgreSQL)
# -----------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vacaciones_sin_stress}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}

# -----------------------------
# JPA / Hibernate
# -----------------------------
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}

# -----------------------------
# Flyway
# -----------------------------
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.validate-on-migrate=true
spring.flyway.default-schema=${DB_SCHEMA:public}
spring.flyway.schemas=${DB_SCHEMA:public}
spring.flyway.create-schemas=true
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.tool.schema=INFO

# Disable SQL init scripts when schema is managed by Flyway
spring.sql.init.mode=never

# -----------------------------
# Error handling
# -----------------------------
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# -----------------------------
# OpenAPI / Swagger UI
# -----------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.persistAuthorization=true

# -----------------------------
# Auth
# -----------------------------
app.auth.clerk.user-id-header=X-Clerk-User-Id
app.auth.clerk.email-header=X-Clerk-Email

# Mock auth fallback (local dev without Clerk)
app.auth.mock-enabled=${APP_AUTH_MOCK_ENABLED:false}
app.auth.mock-current-user-email=${APP_AUTH_MOCK_CURRENT_USER_EMAIL:sofia.employee@vacaciones.local}
app.auth.mock-current-user-clerk-id=${APP_AUTH_MOCK_CURRENT_USER_CLERK_ID:}
