services:
  postgres:
    image: postgres:16-alpine
    container_name: vacaciones_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vacaciones_sin_stress
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - vacaciones_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vacaciones_sin_stress"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vacaciones_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - vacaciones_pgadmin:/var/lib/pgadmin

volumes:
  vacaciones_pgdata:
  vacaciones_pgadmin:
